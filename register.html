<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avisha's Hidden Haven Registration Form</title>
    <link rel="stylesheet" href="register.css">
</head>

 <header>
        <div class="container navbar">
            <div class="logo">Avisha's Hidden Haven Registration Page</div>
            <nav>
                <ul class="nav-links">
                  <li><a href="index.html#hero">Home</a></li>
                  <li><a href="index.html#menu">Menu</a></li>
                  <li><a href="index.html#about-banner">About Us</a></li>
                  <li><a href="index.html#gallery">Gallery</a></li>
                  <li><a href="index.html#reservation">Contact & Reservation</a></li>
                </ul>
                </ul>
            </nav>
        </div>
    </header>

<body>

<div class="container">
    <div class="form-box">
        <h2>Avisha's Hidden Haven User Registration</h2>
        

        <form action="#" method="post">
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname"
                    placeholder="Enter your full name"
                    required
                    pattern="[A-Za-z\s]{3,}">
            </div>

            <div class="input-group">
                <label for="birthday">Birthday</label>
                <input type="date" id="birthday" name="birthday" required>
            </div>

            <div class="input-group">
                <label>Gender</label>

                <div class="gender">
                    <label>
                        <input type="radio" name="gender" value="Male" required> Male
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Female"> Female
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Other"> Other
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="address">Address</label>
                <textarea id="address" name="address"
                    rows="3"
                    placeholder="Enter your complete address"
                    required></textarea>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                    placeholder="example@email.com"
                    required>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel"
                    id="phone"
                    name="phone"
                    placeholder="09123456789"
                    pattern="09[0-9]{9}"
                    maxlength="11"
                    required>
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    minlength="5"
                    required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    minlength="8"
                    required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Confirm password"
                    minlength="8"
                    required>
            </div>

            <div class="buttons">
                <input type="submit" value="Register">
                <input type="reset" value="Reset">
            </div>
<center><a href="login.html">Already have an account? Login here</a></center>
        </form>
    </div>
</div>
<audio id="bgMusic" loop>
    <source src="Heart and Soul.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function () {
    const music = document.getElementById("bgMusic");
    music.volume = 0.15;
    music.play();
}, { once: true });
</script>
</body>
</html>
